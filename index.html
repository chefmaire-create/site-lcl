<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LCL - Connexion</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --lcl-blue:  #003189;
            --lcl-blue2: #0044bb;
            --lcl-red:   #c0392b;
            --bg:        #f0f2f7;
            --white:     #ffffff;
            --gray:      #8a94a6;
            --border:    #d0d5e8;
            --text:      #1a1f36;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .login-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(0,49,137,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(0,68,187,0.08) 0%, transparent 50%),
                var(--bg);
        }

        /* ── LOGO ── */
        .login-header {
            text-align: center;
            margin-bottom: 28px;
            animation: fadeUp .5s ease;
        }
        .login-logo-box {
            width: 72px; height: 72px;
            background: linear-gradient(145deg, var(--lcl-blue), var(--lcl-blue2));
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 14px;
            box-shadow: 0 8px 28px rgba(0,49,137,0.30);
        }
        .login-logo-box span {
            font-size: 1.9rem;
            font-weight: 900;
            color: #fff;
            font-style: italic;
            letter-spacing: .1em;
        }
        .login-header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--lcl-blue);
        }
        .login-header p {
            font-size: .82rem;
            color: var(--gray);
            margin-top: 4px;
        }

        /* ── CARD ── */
        .login-card {
            background: var(--white);
            border-radius: 24px;
            padding: 30px 24px 26px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 40px rgba(0,49,137,0.12);
            border: 1px solid rgba(0,49,137,0.07);
            animation: fadeUp .5s ease .1s both;
        }
        .login-card h2 {
            font-size: .95rem;
            font-weight: 700;
            color: var(--lcl-blue);
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
            letter-spacing: .04em;
        }

        /* ── ERREUR ── */
        .login-error {
            display: none;
            background: #fdecea;
            border: 1px solid #f5c6c2;
            border-radius: 10px;
            padding: 11px 14px;
            margin-bottom: 16px;
            font-size: .83rem;
            color: var(--lcl-red);
            align-items: center;
            gap: 8px;
        }
        .login-error.show { display: flex; }

        /* ── FIELDS ── */
        .field { margin-bottom: 18px; }
        .field label {
            display: block;
            font-size: .74rem;
            font-weight: 600;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 7px;
        }
        .input-wrap { position: relative; }
        .input-wrap .ico-left {
            position: absolute;
            left: 13px; top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: .88rem;
            pointer-events: none;
        }
        .input-wrap input {
            width: 100%;
            padding: 13px 46px 13px 38px;
            border: 1.5px solid var(--border);
            border-radius: 11px;
            font-size: .92rem;
            color: var(--text);
            background: #fafbff;
            outline: none;
            transition: .2s;
            font-family: inherit;
        }
        .input-wrap input:focus {
            border-color: var(--lcl-blue2);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(0,68,187,0.10);
        }
        .input-wrap input::placeholder { color: #c0c8da; }

        /* ── TOGGLE MOT DE PASSE ── */
        .btn-toggle-pass {
            position: absolute;
            right: 10px; top: 50%;
            transform: translateY(-50%);
            background: #eef1f8;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            width: 32px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--gray);
            font-size: .85rem;
            transition: .2s;
        }
        .btn-toggle-pass:hover {
            background: var(--lcl-blue);
            color: #fff;
            border-color: var(--lcl-blue);
        }

        /* ── OPTIONS ── */
        .login-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
        }
        .remember-me {
            display: flex; align-items: center; gap: 7px;
            font-size: .8rem; color: var(--gray); cursor: pointer;
        }
        .remember-me input[type="checkbox"] {
            width: 15px; height: 15px;
            accent-color: var(--lcl-blue); cursor: pointer;
        }
        .forgot-link {
            font-size: .8rem;
            color: var(--lcl-blue2);
            font-weight: 500;
            cursor: pointer;
            transition: .2s;
        }
        .forgot-link:hover { text-decoration: underline; }

        /* ── BOUTON ── */
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--lcl-blue), var(--lcl-blue2));
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: .95rem;
            font-weight: 700;
            letter-spacing: .06em;
            cursor: pointer;
            transition: .22s;
            box-shadow: 0 4px 18px rgba(0,49,137,0.28);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(0,49,137,0.35); }
        .btn-login:active { transform: translateY(0); }

        /* ── FOOTER ── */
        .login-footer {
            margin-top: 24px;
            text-align: center;
            animation: fadeUp .5s ease .2s both;
        }
        .badges {
            display: flex; align-items: center; justify-content: center;
            gap: 18px; margin-bottom: 10px;
        }
        .badge-secure {
            display: flex; align-items: center; gap: 5px;
            font-size: .72rem; color: var(--gray);
        }
        .badge-secure i { color: #1a7a4a; }
        .login-footer p { font-size: .72rem; color: var(--gray); }

        /* ── SPINNER ── */
        .spinner-overlay {
            position: fixed; inset: 0;
            background: rgba(10,20,60,0.5);
            z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: .2s;
        }
        .spinner-overlay.show { opacity: 1; pointer-events: all; }
        .spinner {
            width: 46px; height: 46px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(20px); }
            to   { opacity:1; transform:translateY(0); }
        }
    </style>
</head>
<body>

    <div class="login-page">

        <!-- LOGO -->
        <div class="login-header">
            <div class="login-logo-box"><span>LCL</span></div>
            <h1>Le Crédit Lyonnais</h1>
            <p>Espace client sécurisé</p>
        </div>

        <!-- CARD -->
        <div class="login-card">

            <h2><i class="fas fa-lock" style="margin-right:8px;font-size:.85rem;"></i>CONNEXION</h2>

            <!-- MESSAGE ERREUR -->
            <div class="login-error" id="login-error">
                <i class="fas fa-exclamation-circle"></i>
                <span id="error-msg">Identifiant ou mot de passe incorrect.</span>
            </div>

            <form id="login-form" onsubmit="doLogin(event)">

                <!-- NUMÉRO CLIENT -->
                <div class="field">
                    <label>Numéro client</label>
                    <div class="input-wrap">
                        <i class="fas fa-user ico-left"></i>
                        <input
                            type="text"
                            id="input-user"
                            placeholder="Votre numéro client"
                            autocomplete="username"
                            required
                        >
                    </div>
                </div>

                <!-- MOT DE PASSE + TOGGLE -->
                <div class="field">
                    <label>Mot de passe</label>
                    <div class="input-wrap">
                        <i class="fas fa-key ico-left"></i>
                        <input
                            type="password"
                            id="input-pass"
                            placeholder="••••••••"
                            autocomplete="current-password"
                            required
                        >
                        <button type="button" class="btn-toggle-pass" onclick="togglePassword()" title="Afficher / Masquer le mot de passe">
                            <i class="fas fa-eye" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- OPTIONS -->
                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember-me"> Se souvenir de moi
                    </label>
                    <span class="forgot-link" onclick="showForgot()">Mot de passe oublié ?</span>
                </div>

                <!-- BOUTON CONNEXION -->
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> SE CONNECTER
                </button>

            </form>
        </div>

        <!-- FOOTER -->
        <div class="login-footer">
            <div class="badges">
                <div class="badge-secure"><i class="fas fa-shield-alt"></i> Connexion SSL</div>
                <div class="badge-secure"><i class="fas fa-check-circle"></i> Données chiffrées</div>
            </div>
            <p>© 2024 LCL — Simulation bancaire · Aucune transaction réelle</p>
        </div>

    </div>

    <!-- SPINNER -->
    <div class="spinner-overlay" id="spinner">
        <div class="spinner"></div>
    </div>

    <script>
        // ═══════════════════════════════
        //  IDENTIFIANTS DE CONNEXION
        // ═══════════════════════════════
        const USERS = [
            { login: 'DjanIsFake', password: '44454241' }
        ];

        // ═══════════════════════════════
        //  CONNEXION
        // ═══════════════════════════════
        function doLogin(e) {
            e.preventDefault();
            const user = document.getElementById('input-user').value.trim();
            const pass = document.getElementById('input-pass').value;

            hideError();
            showSpinner(true);

            setTimeout(() => {
                const found = USERS.find(u => u.login === user && u.password === pass);

                if (found) {
                    if (document.getElementById('remember-me').checked) {
                        localStorage.setItem('lcl_user', user);
                    }
                    window.location.href = 'dashboard.html';
                } else {
                    showSpinner(false);
                    showError('Numéro client ou mot de passe incorrect. Veuillez réessayer.');
                    document.getElementById('input-pass').value = '';
                    document.getElementById('input-pass').focus();
                }
            }, 900);
        }

        // ═══════════════════════════════
        //  AFFICHER / MASQUER MOT DE PASSE
        // ═══════════════════════════════
        function togglePassword() {
            const input = document.getElementById('input-pass');
            const icon  = document.getElementById('eye-icon');

            if (input.type === 'password') {
                // Afficher le mot de passe
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                // Masquer le mot de passe
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        // ═══════════════════════════════
        //  MOT DE PASSE OUBLIÉ
        // ═══════════════════════════════
        function showForgot() {
            alert('Pour réinitialiser votre mot de passe,\ncontactez votre conseiller LCL au 0 800 000 000.');
        }

        // ═══════════════════════════════
        //  AFFICHER ERREUR
        // ═══════════════════════════════
        function showError(msg) {
            document.getElementById('error-msg').textContent = msg;
            document.getElementById('login-error').classList.add('show');
        }
        function hideError() {
            document.getElementById('login-error').classList.remove('show');
        }

        // ═══════════════════════════════
        //  SPINNER
        // ═══════════════════════════════
        function showSpinner(v) {
            document.getElementById('spinner').classList.toggle('show', v);
        }

        // ═══════════════════════════════
        //  AUTO-REMPLIR SI "SE SOUVENIR"
        // ═══════════════════════════════
        window.onload = () => {
            const saved = localStorage.getItem('lcl_user');
            if (saved) {
                document.getElementById('input-user').value = saved;
                document.getElementById('remember-me').checked = true;
                document.getElementById('input-pass').focus();
            }
        };
    </script>

</body>
</html>
